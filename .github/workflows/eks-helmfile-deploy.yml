
on:
  workflow_call:
    inputs:
      cluster_name:
        description: "Name of the EKS cluster"
        required: true
        type: string
      environment:
        description: "Environment to deploy to"
        required: true
        type: string
      namespace:
        description: "Namespace to deploy to"
        required: true
        type: string
      role-to-assume:
        description: "Role to assume"
        required: true
        type: string
      role-to-assume-devops:
        description: "Role to assume"
        required: true
        type: string
      region:
        description: "AWS Region"
        required: true
        type: string
      ecr-registries:
        description: "ECR Registries Number"
        required: true
        type: string
jobs:
  deploy:
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: image-tag

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: ${{ inputs.region }}

      - name: Set ENV Variables
        shell: bash
        run: |
          echo "IMAGE_TAG=$(cat image-tag.txt)" >> $GITHUB_ENV
          echo "NAMESPACE=${{ inputs.namespace }}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ inputs.environment }}" >> $GITHUB_ENV

      - name: Setup Cluster Access
        run: |
          aws eks update-kubeconfig --name ${{ inputs.cluster_name }} --kubeconfig ./kubeconfig
          echo 'KUBE_CONFIG_DATA<<EOF' >> $GITHUB_ENV
          echo $(cat ./kubeconfig | base64) >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV
        env:
          AWS_REGION: ${{ inputs.region }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_REGION: ${{ inputs.region }}
          AWS_ASSUME_ROLE: ${{ inputs.role-to-assume-devops }}
        with:
          registries: ${{ inputs.ecr-registries }}

      - name: Helm Diff
        uses: helmfile/helmfile-action@v1.9.1
        env:
          KUBECONFIG: "./kubeconfig"
        with:
          helmfile-version: 'v0.150.0'
          helm-version: 'v3.8.0'
          helm-plugins: >
            https://github.com/databus23/helm-diff,
            https://github.com/jkroepke/helm-secrets
          helmfile-args: diff -f helmfile.yaml

      - name: Helm Deploy
        uses: helmfile/helmfile-action@v1.9.1
        env:
          KUBECONFIG: "./kubeconfig"
        with:
          helmfile-version: 'v0.150.0'
          helm-version: 'v3.8.0'
          helm-plugins: >
            https://github.com/databus23/helm-diff,
            https://github.com/jkroepke/helm-secrets
          helmfile-args: sync -f helmfile.yaml
